<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MATRIX CLOUD V3 | OFFICIAL</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --neon: #00ff41;
            --bg: #000000;
            --glass: rgba(15, 15, 15, 0.98);
            --border: #1a1a1a;
        }

        * { box-sizing: border-box; user-select: none; transition: 0.3s; }
        body { background: var(--bg); color: #fff; font-family: 'Cairo', sans-serif; margin: 0; overflow-x: hidden; }

        /* شاشة التحميل Matrix */
        #loader { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        .glitch { font-size: 2rem; color: var(--neon); text-shadow: 0 0 10px var(--neon); animation: pulse 1s infinite; }

        /* الهيدر */
        header { 
            background: var(--glass); border-bottom: 1px solid var(--neon); padding: 15px 25px;
            display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000;
            backdrop-filter: blur(10px); box-shadow: 0 5px 20px rgba(0,255,65,0.1);
        }
        .logo-box { display: flex; flex-direction: column; }
        .logo-box b { color: var(--neon); letter-spacing: 2px; }
        .wallet-box { background: #080808; border: 1px solid var(--neon); padding: 5px 15px; border-radius: 30px; cursor: pointer; font-weight: bold; }

        /* حاوية المحتوى */
        .app-container { max-width: 800px; margin: 20px auto; padding: 10px; }
        .card { background: var(--glass); border: 1px solid var(--border); border-radius: 20px; padding: 25px; margin-bottom: 25px; position: relative; overflow: hidden; }
        .card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--neon); opacity: 0.5; }
        
        h3 { color: var(--neon); display: flex; align-items: center; gap: 10px; font-size: 1.2rem; margin-top: 0; }
        input, select { 
            width: 100%; background: #050505; border: 1px solid #222; color: #fff; 
            padding: 15px; border-radius: 12px; margin-top: 10px; outline: none; font-family: 'Cairo';
        }
        input:focus { border-color: var(--neon); box-shadow: 0 0 10px rgba(0,255,65,0.2); }

        .btn-action { 
            background: var(--neon); color: #000; border: none; padding: 15px; border-radius: 12px; 
            width: 100%; margin-top: 20px; font-weight: bold; cursor: pointer; font-size: 1rem;
        }
        .btn-action:hover { transform: translateY(-3px); box-shadow: 0 5px 20px var(--neon); }

        /* لوحة الأدمن الاحترافية */
        #adminPanel { display: none; position: fixed; inset: 0; background: #000; z-index: 10001; padding: 30px; overflow-y: auto; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--neon); padding-bottom: 15px; }
        .table-res { width: 100%; overflow-x: auto; margin-top: 25px; border-radius: 10px; background: #050505; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { background: #111; color: var(--neon); padding: 15px; text-align: center; font-size: 13px; }
        td { padding: 15px; border-bottom: 1px solid #111; text-align: center; font-size: 12px; }
        .badge { padding: 4px 10px; border-radius: 5px; font-size: 10px; font-weight: bold; }
        .pnd { background: #ffaa0022; color: #ffaa00; }
        .apr { background: #00ff4122; color: #00ff41; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="loader"><div class="glitch">MATRIX V3 LOADING...</div></div>

    <header>
        <div class="logo-box">
            <b>MATRIX CLOUD V3</b>
            <small style="font-size: 9px; color: #555;">ID: <span id="my-uid">...</span></small>
        </div>
        <div class="wallet-box" onclick="topUp()">
            <span id="user-bal">0.00</span>$ <i class="fas fa-wallet" style="color:var(--neon)"></i>
        </div>
    </header>

    <div class="app-container">
        <div class="card">
            <h3><i class="fas fa-server"></i> Cloud Hosting | استضافة</h3>
            <p style="font-size: 11px; color: #888;">ارفع ملف البوت الخاص بك (Python/JS) - التكلفة 100ج شهرياً.</p>
            <input type="file" id="botFile">
            <input type="password" id="adminSecret" placeholder="Bot Token / Admin Password">
            <button class="btn-action" onclick="handleAuth()">دخول / رفع الملف 🚀</button>
        </div>

        <div class="card">
            <h3><i class="fas fa-shopping-cart"></i> SMM Services | خدمات السوشيال</h3>
            <select id="smmSelect">
                <optgroup label="إنستجرام">
                    <option value="50">1000 متابع - 50ج</option>
                    <option value="20">1000 لايك - 20ج</option>
                </optgroup>
                <optgroup label="تيك توك">
                    <option value="110">1000 متابع - 110ج</option>
                    <option value="10">1000 لايك - 10ج</option>
                </optgroup>
                <optgroup label="تليجرام">
                    <option value="60">1000 متابع - 60ج</option>
                </optgroup>
            </select>
            <input type="text" id="targetLink" placeholder="رابط الحساب المستهدف">
            <button class="btn-action" onclick="orderSmm()">تأكيد الطلب 🛒</button>
        </div>
    </div>

    <div id="adminPanel">
        <div class="admin-header">
            <h2 style="color:var(--neon); margin:0;">MASTER CONTROL</h2>
            <button onclick="location.reload()" style="background:red; color:#fff; border:none; padding:10px 20px; border-radius:8px; cursor:pointer; font-family:'Cairo';">خروج آمن</button>
        </div>
        
        <div class="table-res">
            <table>
                <thead>
                    <tr>
                        <th>ID الطلب</th>
                        <th>المستخدم</th>
                        <th>النوع</th>
                        <th>التفاصيل</th>
                        <th>الحالة</th>
                        <th>تحكم</th>
                    </tr>
                </thead>
                <tbody id="logs-body">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // --- الأمن العالي ---
        setInterval(() => { let s = Date.now(); debugger; if (Date.now() - s > 100) document.body.innerHTML = ""; }, 500);
        window.onkeydown = (e) => { if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74))) return false; };

        // --- إعدادات فايربيز (يوسف) ---
        const firebaseConfig = {
            apiKey: "AIzaSyAkz8kGNDOJ5caCIbdoXpvJBZgUbigjT5g",
            databaseURL: "https://matrix-c2-default-rtdb.firebaseio.com",
            projectId: "matrix-c2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- نظام الـ ID والمحفظة ---
        let user_id = localStorage.getItem('mx_id') || "MX-" + Math.floor(1000 + Math.random()*9000);
        localStorage.setItem('mx_id', user_id);
        document.getElementById('my-uid').innerText = user_id;

        // تحديث الرصيد لايف
        db.ref('users/' + user_id + '/balance').on('value', snap => {
            document.getElementById('user-bal').innerText = (snap.val() || 0).toFixed(2);
        });

        // --- وظائف التشغيل ---
        window.onload = () => { setTimeout(() => document.getElementById('loader').style.display = 'none', 1500); };

        function handleAuth() {
            let secret = document.getElementById('adminSecret').value;
            if(secret === "matrixjo") {
                Swal.fire({ title: "Welcome Yousef", icon: "success", background: "#000", color: "#00ff41" });
                document.getElementById('adminPanel').style.display = 'block';
                loadAdminLogs();
            } else {
                Swal.fire("تم الرفع", "طلبك قيد المراجعة الآن برقم #"+Math.floor(Math.random()*1000), "info");
            }
        }

        function loadAdminLogs() {
            db.ref('orders').on('value', snap => {
                const body = document.getElementById('logs-body');
                body.innerHTML = "";
                const data = snap.val();
                for(let id in data) {
                    let o = data[id];
                    body.innerHTML += `
                        <tr>
                            <td>${id.substring(0,8)}</td>
                            <td>${o.userId}</td>
                            <td>${o.type}</td>
                            <td>${o.link || 'ملف'}</td>
                            <td><span class="badge ${o.status=='مقبول'?'apr':'pnd'}">${o.status}</span></td>
                            <td><button onclick="approveOrder('${id}','${o.userId}',${o.amount || 100})" style="cursor:pointer">✅</button></td>
                        </tr>
                    `;
                }
            });
        }

        function approveOrder(id, uid, amt) {
            db.ref('orders/' + id).update({ status: 'مقبول' });
            // إضافة رصيد لو كان طلب شحن (مثال)
            db.ref('users/' + uid + '/balance').transaction(c => (c || 0) + (amt/50));
            Swal.fire("Success", "تم تفعيل الطلب", "success");
        }

        function orderSmm() {
            Swal.fire("خطأ", "رصيدك غير كافٍ، تواصل مع الأدمن للشحن", "error");
        }

        function topUp() {
            Swal.fire({
                title: "شحن رصيد",
                text: "ارسل رقم الـ ID الخاص بك للأدمن لتفعيل الرصيد: " + user_id,
                icon: "info",
                background: "#000",
                color: "#fff"
            });
        }
    </script>
</body>
</html>
