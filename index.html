<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MATRIX CLOUD V3 | PRO EDITION</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --neon: #00ff41;
            --bg: #000000;
            --glass: rgba(20, 20, 20, 0.9);
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Cairo', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* هيدر احترافي */
        header {
            background: var(--glass);
            border-bottom: 1px solid var(--neon);
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(15px);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo { font-weight: bold; color: var(--neon); text-shadow: 0 0 10px var(--neon); }
        .user-id { font-size: 10px; color: #666; }

        /* حاوية المحتوى */
        .container { padding: 15px; max-width: 500px; margin: auto; width: 100%; }

        /* الكروت الزجاجية */
        .card {
            background: var(--glass);
            border: 1px solid #1a1a1a;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            transition: 0.3s;
        }
        .card:hover { border-color: var(--neon); box-shadow: 0 0 15px rgba(0,255,65,0.1); }

        h3 { color: var(--neon); margin-top: 0; font-size: 1.1rem; border-bottom: 1px dashed #333; padding-bottom: 10px; }

        /* المدخلات */
        select, input {
            width: 100%;
            background: #0a0a0a;
            border: 1px solid #333;
            color: var(--neon);
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-family: 'Cairo';
        }

        /* زر النيون */
        .main-btn {
            background: var(--neon);
            color: #000;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 255, 65, 0.3);
        }

        /* الحماية البصرية */
        .protected-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            border: 2px solid transparent;
            z-index: 9999;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <header>
        <div class="logo-area">
            <div class="logo">MATRIX CLOUD <small>V3</small></div>
            <div class="user-id">MY ID: <span id="display-id">MX-LOADING</span></div>
        </div>
        <div class="wallet" onclick="topUp()">
            <span id="bal">0.00</span>$ <i class="fas fa-bolt" style="color:var(--neon)"></i>
        </div>
    </header>

    <div class="container">
        <div class="card">
            <h3><i class="fas fa-server"></i> استضافة بوت (100ج)</h3>
            <input type="file" id="botFile">
            <input type="text" id="token" placeholder="Bot Token / Admin Code">
            <button class="main-btn" onclick="uploadBot()">تشغيل السيرفر ⚡</button>
        </div>

        <div class="card">
            <h3><i class="fas fa-share-nodes"></i> خدمات السوشيال ميديا</h3>
            <select id="service">
                <optgroup label="انستجرام">
                    <option value="50">1000 متابع انستجرام - 50ج</option>
                    <option value="20">1000 لايك انستجرام - 20ج</option>
                </optgroup>
                <optgroup label="تيك توك">
                    <option value="110">1000 متابع تيك توك - 110ج</option>
                    <option value="10">1000 لايك تيك توك - 10ج</option>
                    <option value="35">15000 مشاهده تيك توك - 35ج</option>
                </optgroup>
                <optgroup label="تليجرام">
                    <option value="60">1000 متابع تليجرام - 60ج</option>
                    <option value="20">1000 تفاعلات تليجرام - 20ج</option>
                </optgroup>
            </select>
            <input type="text" id="link" placeholder="رابط الحساب أو القناة">
            <button class="main-btn" onclick="orderSmm()">تأكيد العملية 🛒</button>
        </div>
    </div>

    <script>
        // --- الأمن والحماية ---
        // 1. منع الـ DevTools
        setInterval(() => {
            const start = Date.now();
            debugger; 
            if (Date.now() - start > 100) {
                document.body.innerHTML = "<div style='color:red; text-align:center; margin-top:50px;'>🚨 SECURITY BREACH DETECTED 🚨</div>";
            }
        }, 500);

        // 2. منع الاختصارات
        window.addEventListener('keydown', (e) => {
            if (e.ctrlKey && (e.key === 'u' || e.key === 'i' || e.key === 'j' || e.key === 's')) {
                e.preventDefault();
            }
            if (e.key === 'F12') e.preventDefault();
        });

        // --- نظام الـ ID ---
        let myID = localStorage.getItem('mx_id') || "MX-" + Math.floor(1000 + Math.random()*9000);
        localStorage.setItem('mx_id', myID);
        document.getElementById('display-id').innerText = myID;

        // --- الربط الوهمي (لحين رفع الـ JS) ---
        function uploadBot() {
            let t = document.getElementById('token').value;
            if(t === "matrixjo") {
                Swal.fire("Welcome Admin", "فتح لوحة التحكم الشبح...", "success");
                // هنا تفتح لوحة الأدمن
            } else {
                Swal.fire("تم الرفع", "رقم الطلب: #"+Math.floor(Math.random()*99999), "info");
            }
        }

        function orderSmm() {
            Swal.fire("رصيد غير كافٍ", "اشحن محفظتك أولاً يا بطل", "warning");
        }
    </script>
</body>
</html>
